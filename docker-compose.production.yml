services:
  postgres:
    image: postgres:16-alpine
    container_name: short-video-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: short_video_automation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d short_video_automation"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: short-video-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/short_video_automation?schema=public
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      FFMPEG_PATH: ffmpeg
      FFPROBE_PATH: ffprobe
      WHISPER_PYTHON_PATH: python3
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - storage_data:/app/storage

volumes:
  postgres_data:
  storage_data:
